<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Box-ChatIA</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/orbital-ui.css">
</head>
<body>

    <div id="app-container">
        <main id="chat-display" class="glass-panel">
            <div id="output-area">
                <h1>Box-ChatIA</h1>
                <p>Selecione um nicho para começar a exploração profunda.</p>
            </div>
        </main>

        <nav id="orbital-menu">
            <div class="orbital-center">
                <input type="text" id="user-input" placeholder="Pergunte algo reflexivo...">
                <button id="send-btn">Enviar</button>
            </div>
        </nav>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
